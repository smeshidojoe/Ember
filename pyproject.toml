[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "ember-extract"
version = "0.1.0"
description = "Извлечение прямых ссылок на медиа из TikTok, Twitter/X, Instagram, Reddit (аналог cobalt в виде библиотеки)"
readme = "README.md"
requires-python = ">=3.9"
dependencies = ["requests>=2.25"]

[tool.setuptools.packages.find]
include = ["ember*"]
